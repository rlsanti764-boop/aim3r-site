<!DOCTYPE html>
<html>
<head>
  <title>GIF HUB PRO</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🔥 GIF HUB PRO</h1>

<div class="tabs">
  <button onclick="openTab('chat')">🤖 Bot</button>
  <button onclick="openTab('gif')">🎞️ GIFs</button>
  <button onclick="openTab('cmd')">📜 Comandos</button>
</div>

<div id="chat" class="tab">
  <h2>Chat IA</h2>
  <input id="msg" placeholder="Escreve..." />
  <button onclick="send()">Enviar</button>
  <div id="output"></div>
</div>

<div id="gif" class="tab" style="display:none;">
  <h2>GIFs</h2>
  <input id="gifSearch" placeholder="Pesquisar GIF" />
  <button onclick="searchGif()">Procurar</button>
  <div id="gifResult"></div>
</div>

<div id="cmd" class="tab" style="display:none;">
  <h2>Comandos</h2>
  <p>/gif - pesquisa GIF</p>
  <p>/chat - fala com IA</p>
</div>

<script src="app.js"></script>
</body>
</html>
