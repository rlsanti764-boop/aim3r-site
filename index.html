<div class="tabs">
  <button onclick="openTab('chat')">🤖 Bot</button>
  button onclick="openTab('comandos')">📜 Comandos</button>
</div>

<div id="chat" class="tab">
  <h2>Chat Bot</h2>
  <p>Aqui vai o teu bot</p>
</div>

<div id="comandos" class="tab" style="display:none;">
  <h2>Comandos</h2>
  <ul>
    <li>/gif - manda GIF</li>
    <li>/help - ajuda</li>
    <li>/chat - falar com bot</li>
  </ul>
</div>
<script>
function openTab(tabName) {
  const tabs = document.querySelectorAll(".tab");

  tabs.forEach(t => t.style.display = "none");

  document.getElementById(tabName).style.display = "block";
}
</script>
